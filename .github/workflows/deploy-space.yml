name: Deploy Hugging Face Space

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Space
    if: ${{ false }} # Deployment is frozen.
    runs-on: ubuntu-latest
    environment: huggingface-space
    env:
      DEPLOY_DIR: dist/huggingface-space
      HF_SPACE_REPO: build-small-hackathon/watch-my-escape

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Hugging Face Xet
        run: |
          git lfs install
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/huggingface/xet-core/refs/heads/main/git_xet/install.sh | sh
          git xet install
          git xet --version

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: make assets

      - name: Run tests
        run: uv run pytest

      - name: Assemble Space artifact
        run: |
          mkdir -p "$DEPLOY_DIR"
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.venv' \
            --exclude '.pytest_cache' \
            --exclude '.ruff_cache' \
            --exclude '.ty_cache' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude 'build' \
            --exclude 'space' \
            --exclude 'src/watch_my_escape/web/static/fonts' \
            ./ "$DEPLOY_DIR"/
          mkdir -p "$DEPLOY_DIR/build/web"
          cp -R build/web/static "$DEPLOY_DIR/build/web/static"
          cp space/app.py "$DEPLOY_DIR/app.py"
          cp space/requirements.txt "$DEPLOY_DIR/requirements.txt"
          cp space/.gitattributes "$DEPLOY_DIR/.gitattributes"
          {
            echo "---"
            cat space/README.frontmatter.yml
            echo "---"
            echo
            cat README.md
          } > "$DEPLOY_DIR/README.md"
          test -f "$DEPLOY_DIR/build/web/static/app.js"
          test -f "$DEPLOY_DIR/build/web/static/styles.css"

      - name: Push Space artifact
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd "$DEPLOY_DIR"
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git add -f build/web/static
          git commit -m "Deploy Space"
          git branch -M main
          git remote add origin "https://build-small-hackathon:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}"
          git push --force origin main
